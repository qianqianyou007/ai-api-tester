name: Pytest CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行测试（含覆盖率）
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python -c "
          import os
          token = os.environ.get('GITHUB_TOKEN', None)
          with open('config/config.py', 'w') as f:
              f.write(f'AI_API_KEY = None\n')
              f.write(f'AI_API_URL = \"https://api.deepseek.com/v1/chat/completions\"\n')
              f.write(f'AI_MODEL = \"deepseek-chat\"\n')
              f.write(f'GITHUB_API_URL = \"https://api.github.com\"\n')
              f.write(f'GITHUB_TOKEN = {repr(token)}\n')
              f.write(f'TEST_TIMEOUT = 10\n')
          "
          pytest generated_tests/ -v --tb=short --html=reports/test_report.html --cov=generated_tests --cov-report=term -k "not releases" -m "not (positive and POST) and not (positive and DELETE)"

      - name: 上传 HTML 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/